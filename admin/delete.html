<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Systems Console — Node Purge</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #0f0f0f; 
            color: #e6edf3; 
            font-family: 'JetBrains Mono', monospace; 
            padding: 40px 20px; 
            line-height: 1.5; 
        }
        .panel { 
            max-width: 700px; 
            margin: 0 auto; 
            border: 1px solid #1c2333; 
            padding: 32px; 
        }
        h2 { 
            font-size: 1.2rem; 
            margin-bottom: 24px; 
            border-bottom: 1px solid #161d28; 
            padding-bottom: 12px; 
            color: #ff7b72; 
        }
        .field { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            font-size: 0.75rem; 
            color: #8b949e; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
        }
        input { 
            width: 100%; 
            background: #0d1117; 
            border: 1px solid #1c2333; 
            padding: 12px; 
            color: #e6edf3; 
            font-family: inherit; 
            font-size: 0.85rem; 
        }
        input:focus { 
            border-color: #ff7b72; 
            outline: none; 
        }
        button { 
            background: #1c2333; 
            color: #e6edf3; 
            border: 1px solid #3d5068; 
            padding: 12px 24px; 
            font-family: inherit; 
            font-size: 0.8rem; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        button:hover { 
            background: #462525; 
            border-color: #ff7b72; 
        }
        #status { 
            margin-top: 16px; 
            font-size: 0.85rem; 
            color: #ff7b72; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="panel">
        <h2>System Purge Protocol</h2>
        <div class="field">
            <label>Auth Access Key</label>
            <input type="password" id="secret" autocomplete="current-password">
        </div>
        <div class="field">
            <label>Node ID to Purge</label>
            <input type="text" id="id" placeholder="e.g. dsbom-engine">
        </div>
        <button type="button" onclick="purgeLogNode()">Execute System Purge</button>
        <div id="status"></div>
    </div>

    <script>
        async function purgeLogNode() {
            const status = document.getElementById('status');
            const id = document.getElementById('id').value.trim();
            
            if (!confirm(`CAUTION: This will permanently delete node '${id}'. Proceed?`)) return;

            status.innerText = "[*] Transmitting purge command to Cloudflare edge...";
            
            try {
                const res = await fetch('/api/publish', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        secret: document.getElementById('secret').value,
                        id: id
                    })
                });

                if(res.ok) {
                    status.style.color = '#3fb950';
                    status.innerText = `[+] Node '${id}' purged. Pipeline rebuilding. (Remember: git pull, if locally deployed)`;
                } else {
                    const output = await res.json();
                    status.style.color = '#f85149';
                    status.innerText = `[-] Pipeline rejection: ${output.error}`;
                }
            } catch(e) {
                status.style.color = '#f85149';
                status.innerText = "[-] Network execution error.";
            }
        }
    </script>
</body>
</html>
