<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicasoTheDealer — Engineering Logs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --border-default: #1c2333;
            --border-subtle: #161d28;
            --text-primary: #e6edf3;
            --text-secondary: #b1bac4;
            --text-tertiary: #8b949e;
            --accent: #5b7a9e;
            --font-mono: 'JetBrains Mono', monospace;
            --font-P2P: 'Press Start 2P', system-ui;
            --track-width: 340px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background-color: var(--bg-primary);
            font-family: var(--font-mono);
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.018;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1340px;
            margin: 0 auto;
            padding: 0 48px;
        }


        /* Hero Section */
        .hero {
            padding: 60px 0 40px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 40px;
        }

        .hero-overline {
            font-size: 0.7rem;
            color: white;
            margin-bottom: 14px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .hero-name {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 10px;
            font-family: var(--font-P2P);
        }

        .hero-subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        /* Navigation */
        .hero-contact-row {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-top: 20px;
        }

        .hero-contact-link {
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .hero-contact-link:hover {
            color: var(--accent);
        }

        .hero-contact-sep {
            color: var(--border-default);
            font-size: 0.7rem;
        }


        .main-grid {
            display: grid;
            grid-template-columns: 1fr var(--track-width);
            gap: 56px;
        }

        .section-label {
            font-size: 0.68rem;
            color: var(--text-tertiary);
            margin-bottom: 28px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            border-left: 3px solid var(--accent-subtle);
            padding-left: 14px;
        }


        .blog-post-block {
            padding: 28px 0 28px 18px;
            border-left: 2px solid var(--border-default);
            margin-bottom: 12px;
            transition: border-color 0.25s ease;
        }

        .blog-post-block:hover {
            border-left-color: var(--accent);
        }

        .post-meta {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            display: block;
        }

        .post-meta span {
            color: var(--accent);
            margin-right: 8px;
        }

        .post-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }

        .post-title:hover {
            color: var(--accent);
        }

        .post-excerpt {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .read-more-link {
            font-size: 0.75rem;
            color: var(--accent);
            text-decoration: none;
        }

        .read-more-link:hover {
            color: var(--text-primary);
        }

        /* System Status */
        .system-status { color: var(--text-tertiary); font-size: 0.85rem; }
        .log-message { color: #8b949e; font-size: 0.9rem; }
        .log-error { color: #ff7b72; font-size: 0.9rem; }


        @media (max-width: 1100px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="hero">
            <span class="hero-overline">~/root/logs</span>
            <h1 class="hero-name">PicasoTheDealer — Engineering Blog</h1>
            <p class="hero-subtitle">Deep dives into low-level instrumentation, kernel virtualization mechanisms, and runtime system telemetry.</p>
            <div class="hero-contact-row">
                <a href="https://isitreallyme.pages.dev" class="hero-contact-link"><i class="bi bi-arrow-left-square"></i> Return to Portfolio</a>
                <span class="hero-contact-sep">|</span>
                <a href="https://github.com/PicasoTheDeal" target="_blank" class="hero-contact-link"><i class="bi bi-github"></i> GitHub</a>
            </div>
        </header>

        <div class="main-grid">
            <main>
                <span class="section-label">Technical Publications</span>
                <div id="posts-container">
                    <p class="system-status">[ system status: querying log manifest... ]</p>
                </div>
            </main>
        </div>
    </div>

    <script>
        async function fetchLogs() {
            try {
                const res = await fetch('/posts.json');
                const logs = await res.json();
                const container = document.getElementById('posts-container');
                container.innerHTML = '';
                
                if(logs.length === 0) {
                    container.innerHTML = '<p class="log-message">No execution logs found in manifest.</p>';
                    return;
                }
                
                logs.forEach(log => {
                    const el = document.createElement('article');
                    el.className = 'blog-post-block';
                    el.innerHTML = `
                        <span class="post-meta"><span>[${log.category}]</span> ${log.date} &bull; ${log.readTime} min read</span>
                        <a href="/post.html?id=${log.id}" class="post-title">${log.title}</a>
                        <p class="post-excerpt">${log.excerpt}</p>
                        <a href="/post.html?id=${log.id}" class="read-more-link">Execute Read Log ──►</a>
                    `;
                    container.appendChild(el);
                });
            } catch(e) {
                document.getElementById('posts-container').innerHTML = '<p class="log-error">[!] Failed to resolve log mapping descriptor.</p>';
            }
        }
        document.addEventListener('DOMContentLoaded', fetchLogs);
    </script>
</body>
</html>
