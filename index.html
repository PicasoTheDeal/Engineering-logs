<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PicasoTheDealer — Engineering Logs</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f0f;
            --border-default: #1c2333;
            --border-subtle: #161d28;
            --text-primary: #e6edf3;
            --text-secondary: #b1bac4;
            --text-tertiary: #8b949e;
            --accent: #5b7a9e;
            --font-mono: 'JetBrains Mono', monospace;
            --font-P2P: 'Press Start 2P', system-ui;
            --track-width: 340px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background-color: var(--bg-primary);
            font-family: var(--font-mono);
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.018;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1340px;
            margin: 0 auto;
            padding: 0 48px;
        }

        .hero {
            padding: 60px 0 40px;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 40px;
        }

        .hero-overline {
            font-size: 0.7rem;
            color: white;
            margin-bottom: 14px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.14em;
        }

        .hero-name {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 800;
            margin-bottom: 10px;
            font-family: var(--font-P2P);
        }

        .hero-subtitle {
            color: var(--text-secondary);
            font-size: 1.05rem;
        }

        .hero-contact-row {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-top: 20px;
        }

        .hero-contact-link {
            font-size: 0.78rem;
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .hero-contact-link:hover {
            color: var(--accent);
        }

        .hero-contact-sep {
            color: var(--border-default);
            font-size: 0.7rem;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr var(--track-width);
            gap: 56px;
            align-items: start;
        }

        .section-label {
            font-size: 0.68rem;
            color: var(--text-tertiary);
            margin-bottom: 28px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding-left: 2px;
        }

        .blog-post-block {
            padding: 28px 0 28px 18px;
            border-left: 2px solid var(--border-default);
            margin-bottom: 12px;
            transition: border-color 0.25s ease;
        }

        .blog-post-block:hover {
            border-left-color: var(--accent);
        }

        .post-meta {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            display: block;
        }

        .post-meta span {
            color: var(--accent);
            margin-right: 8px;
        }

        .post-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            margin-bottom: 8px;
        }

        .post-title:hover {
            color: var(--accent);
        }

        .post-excerpt {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 14px;
        }

        .read-more-link {
            font-size: 0.75rem;
            color: var(--accent);
            text-decoration: none;
        }

        .read-more-link:hover {
            color: var(--text-primary);
        }

        .sidebar {
            position: sticky;
            top: 40px;
        }

        .scroll-track-outer {
            height: 480px;
            width: 100%;
            overflow: hidden;
            position: relative;
            border: 1px solid var(--border-default);
            background-color: #0b0b0b;
            border-radius: 4px;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, black 12%, black 88%, transparent 100%);
        }

        .scroll-track-inner {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 32px 16px;
            animation: scrollVertical 22s linear infinite;
            will-change: transform;
        }

        .scroll-track-outer:hover .scroll-track-inner {
            animation-play-state: paused;
        }

        @keyframes scrollVertical {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        .track-node-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            color: var(--text-secondary);
            font-size: 0.82rem;
            border: 1px solid transparent;
            border-radius: 4px;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-node-item i {
            color: var(--text-tertiary);
            font-size: 0.9rem;
        }

        .track-node-item:hover {
            background-color: var(--border-subtle);
            border-color: var(--border-default);
            color: var(--text-primary);
        }

        .track-node-item:hover i {
            color: var(--accent);
        }

        .system-status { color: var(--text-tertiary); font-size: 0.85rem; }
        .log-message { color: #8b949e; font-size: 0.9rem; }
        .log-error { color: #ff7b72; font-size: 0.9rem; }

        @media (max-width: 1100px) {
            .main-grid {
                grid-template-columns: 1fr;
                gap: 40px;
            }
            .sidebar {
                position: static;
                margin-top: 20px;
                max-width: var(--track-width);
            }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <header class="hero">
            <span class="hero-overline">~/root/logs</span>
            <h1 class="hero-name">PicasoTheDealer — Engineering Blog</h1>
            <p class="hero-subtitle">Deep dives into low-level instrumentation, kernel virtualization mechanisms, and runtime system telemetry.</p>
            <div class="hero-contact-row">
                <a href="https://isitreallyme.pages.dev" class="hero-contact-link"><i class="bi bi-arrow-left-square"></i> Return to Portfolio</a>
                <span class="hero-contact-sep">|</span>
                <a href="https://github.com/PicasoTheDeal" target="_blank" class="hero-contact-link"><i class="bi bi-github"></i> GitHub</a>
            </div>
        </header>

        <div class="main-grid">
            <main>
                <span class="section-label">Technical Publications</span>
                <div id="posts-container">
                    <p class="system-status">[ system status: querying log manifest... ]</p>
                </div>
            </main>

            <aside class="sidebar">
                <span class="section-label">Runtime Engine Clusters</span>
                <div class="scroll-track-outer">
                    <div id="tags-scroll-inner" class="scroll-track-inner">
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        async function fetchLogs() {
            try {
                const res = await fetch('/posts.json');
                const logs = await res.json();
                
                const postsContainer = document.getElementById('posts-container');
                const tagsContainer = document.getElementById('tags-scroll-inner');
                
                postsContainer.innerHTML = '';
                tagsContainer.innerHTML = '';
                
                if (logs.length === 0) {
                    postsContainer.innerHTML = '<p class="log-message">No execution logs found in manifest.</p>';
                    tagsContainer.innerHTML = '<div class="track-node-item"><i class="bi bi-terminal"></i><span>Empty Matrix Ledger</span></div>';
                    return;
                }
                
                const globalTagSet = new Set();
                
                logs.forEach(log => {
                    if (log.category) {
                        log.category.split(',').forEach(tag => {
                            const cleanTag = tag.trim();
                            if (cleanTag) globalTagSet.add(cleanTag);
                        });
                    }

                    const el = document.createElement('article');
                    el.className = 'blog-post-block';
                    el.innerHTML = `
                        <span class="post-meta"><span>[${log.category}]</span> ${log.date} &bull; ${log.readTime} min read</span>
                        <a href="/post.html?id=${log.id}" class="post-title">${log.title}</a>
                        <p class="post-excerpt">${log.excerpt}</p>
                        <a href="/post.html?id=${log.id}" class="read-more-link">Execute Read Log ──►</a>
                    `;
                    postsContainer.appendChild(el);
                });
                
                const dynamicTagsArray = Array.from(globalTagSet);
                
                if (dynamicTagsArray.length > 0) {
                    const mountTags = (tagsList) => {
                        tagsList.forEach(tag => {
                            const node = document.createElement('div');
                            node.className = 'track-node-item';
                            node.innerHTML = `<i class="bi bi-cpu"></i><span>${tag}</span>`;
                            tagsContainer.appendChild(node);
                        });
                    };

                    mountTags(dynamicTagsArray);
                    mountTags(dynamicTagsArray);
                } else {
                    tagsContainer.innerHTML = '<div class="track-node-item"><i class="bi bi-terminal"></i><span>Standard Sandbox Node</span></div>';
                }
                
            } catch(e) {
                document.getElementById('posts-container').innerHTML = '<p class="log-error">[!] Failed to resolve log mapping descriptor.</p>';
                document.getElementById('tags-scroll-inner').innerHTML = '<div class="track-node-item"><i class="bi bi-exclamation-triangle"></i><span>Trace Error</span></div>';
            }
        }
        document.addEventListener('DOMContentLoaded', fetchLogs);
    </script>
</body>
</html>
